# GitHub Actions workflow template to perform project scan and publish results to GitHub Security.
# Uses the ez-appsec Docker image (same as GitLab scan.yml) for full scanner coverage:
# gitleaks, semgrep, grype, kics.

name: ez-appsec Security Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  security-events: write  # Required for SARIF upload to Security tab
  actions: read
  pull-requests: write   # Required for PR comments
  packages: read         # Required to pull ghcr.io/ez-appsec/ez-appsec image

env:
  EZ_APPSEC_OUTPUT_DIR: "scan-results"
  EZ_APPSEC_SARIF: "scan-results/ez-appsec.sarif"
  EZ_APPSEC_IMAGE: "ghcr.io/ez-appsec/ez-appsec:latest"

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ez-appsec/ez-appsec:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.DASHBOARD_PUSH_TOKEN }}
      options: --entrypoint ""
    outputs:
      findings-count: ${{ steps.summary.outputs.findings-count }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ez-appsec scan
        id: scan
        run: |
          echo "Running ez-appsec scan..."
          mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"

          echo "Checking ez-appsec status..."
          ez-appsec status || true

          echo "Starting GitHub SARIF scan..."
          # Use 'all' severity for PRs, 'medium' for main branch
          SEVERITY="${{ github.event_name == 'pull_request' && 'all' || 'medium' }}"
          echo "Severity level: $SEVERITY"
          ez-appsec github-scan . --output "${EZ_APPSEC_SARIF}" --severity "$SEVERITY"

          echo "Scan completed. Checking for output file..."
          if [ -f "${EZ_APPSEC_SARIF}" ]; then
            echo "SARIF file created successfully"
            ls -lh "${EZ_APPSEC_SARIF}"
          else
            echo "ERROR: SARIF file not created at ${EZ_APPSEC_SARIF}"
            exit 1
          fi

      - name: Count findings
        id: summary
        run: |
          if [ -f "${EZ_APPSEC_SARIF}" ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('${EZ_APPSEC_SARIF}'))['runs'][0]['results']))")
            echo "findings-count=$COUNT" >> $GITHUB_OUTPUT
            echo "Found $COUNT security findings"
          else
            echo "findings-count=0" >> $GITHUB_OUTPUT
            echo "No findings found"
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.EZ_APPSEC_SARIF }}
        continue-on-error: true

      - name: Upload scan results as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ez-appsec-scan-${{ github.sha }}
          path: ${{ env.EZ_APPSEC_SARIF }}
          retention-days: 7
          if-no-files-found: warn

      - name: Generate dashboard vulnerabilities.json
        id: web-report
        run: |
          mkdir -p "${EZ_APPSEC_OUTPUT_DIR}"
          ez-appsec web-report . --output "${EZ_APPSEC_OUTPUT_DIR}"

      - name: Upload vulnerabilities.json as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ez-appsec-vulns-${{ github.sha }}
          path: ${{ env.EZ_APPSEC_OUTPUT_DIR }}/vulnerabilities.json
          retention-days: 7
          if-no-files-found: warn

      - name: Push scan results to dashboard (update:vulns)
        if: steps.web-report.outcome == 'success' && github.event_name != 'pull_request'
        env:
          DASHBOARD_PUSH_TOKEN: ${{ secrets.DASHBOARD_PUSH_TOKEN }}
          EZ_APPSEC_DASHBOARD_REPO: ${{ vars.EZ_APPSEC_DASHBOARD_REPO || 'ez-appsec/ez-appsec-dashboard' }}
        run: |
          if [ -z "${DASHBOARD_PUSH_TOKEN}" ]; then
            echo "DASHBOARD_PUSH_TOKEN not set — skipping dashboard update."
            exit 0
          fi
          VULN_FILE="${EZ_APPSEC_OUTPUT_DIR}/vulnerabilities.json"
          if [ ! -f "${VULN_FILE}" ]; then
            echo "vulnerabilities.json not found — skipping dashboard update."
            exit 0
          fi
          SLUG=$(echo "${{ github.repository }}" | tr '/' '-' | tr '.' '-' | tr '_' '-' | tr '[:upper:]' '[:lower:]')
          DASH_DIR=$(mktemp -d)
          git clone "https://x-access-token:${DASHBOARD_PUSH_TOKEN}@github.com/${EZ_APPSEC_DASHBOARD_REPO}.git" "${DASH_DIR}/dashboard"
          mkdir -p "${DASH_DIR}/dashboard/data/projects/${SLUG}"
          cp "${VULN_FILE}" "${DASH_DIR}/dashboard/data/projects/${SLUG}/vulnerabilities.json"
          cat > "${DASH_DIR}/dashboard/data/projects/${SLUG}/meta.json" <<META
          {
            "project_name": "${{ github.event.repository.name }}",
            "project_path": "${{ github.repository }}",
            "github_url": "https://github.com/${{ github.repository }}",
            "default_branch": "${{ github.event.repository.default_branch }}",
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          META
          cd "${DASH_DIR}/dashboard"
          git config user.name "ez-appsec scan"
          git config user.email "ci@ez-appsec.ai"
          git add data/projects/
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update scan results for ${{ github.repository }}"
          git push origin main
          rm -rf "${DASH_DIR}"
          echo "Dashboard updated: https://github.com/${EZ_APPSEC_DASHBOARD_REPO}"

      - name: Comment on PR with findings
        if: github.event_name == 'pull_request' && steps.scan.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const count = '${{ steps.summary.outputs.findings-count }}';
            const artifactUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            let body = `## 🔒 Security Scan Results\n\n`;
            body += `**Findings:** ${count}\n\n`;
            body += `📊 [View full scan results](${artifactUrl})\n\n`;
            body += `💡 Use \`ez-appsec github-scan\` in your local environment for detailed analysis.\n`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🔒 Security Scan Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
